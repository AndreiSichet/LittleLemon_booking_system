{% extends 'base.html' %}
{% load static %}

{% block content %}
<section>
  <article>
    <h1>Make a reservation</h1>
    <div class="row">
      <div class="column">
        <form method="POST" id="form">
          {% csrf_token %}
          <p>
            <label for="first_name">Name:</label>
            <input type="text" name="first_name" placeholder="Your Name" maxlength="200" required id="first_name">
          </p>
          <p>
            <label for="reservation_date">Date:</label>
            <input type="date" name="reservation_date" required id="reservation_date">
          </p>
          <p>
            <label for="reservation_slot">Reservation time:</label>
            <select name="reservation_slot" id="reservation_slot">
              <option value="0" disabled>Select time</option>
            </select>
          </p>
          <button type="button" id="button">Reserve</button>
        </form>
      </div>

      <div class="column">
        <h2>Bookings For <span id="today"></span></h2>
        <div id="bookings">No bookings</div>
      </div>
    </div>
  </article>
</section>

<script>
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.startsWith(name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
const csrftoken = getCookie('csrftoken');

const dateInput = document.getElementById('reservation_date');
dateInput.value = new Date().toISOString().split('T')[0];
document.getElementById('today').textContent = dateInput.value;

getBookings();
dateInput.addEventListener('change', getBookings);

function getBookings() {
  const date = dateInput.value;
  document.getElementById('today').textContent = date;

  fetch("{% url 'bookings' %}" + '?date=' + date)
    .then(r => r.json())
    .then(data => {
      let bookingsHTML = '';
      const reservedSlots = [];

      data.forEach(item => {
        reservedSlots.push(item.fields.reservation_slot);
        bookingsHTML += `<p>${item.fields.first_name} - ${formatTime(item.fields.reservation_slot)}</p>`;
      });

      if (bookingsHTML === '') bookingsHTML = 'No bookings';
      document.getElementById('bookings').innerHTML = bookingsHTML;

      let slot_options = '<option value="0" disabled>Select time</option>';
      for (let i = 10; i < 20; i++) {
        const label = formatTime(i);
        if (reservedSlots.includes(i)) {
          slot_options += `<option value="${i}" disabled>${label}</option>`;
        } else {
          slot_options += `<option value="${i}">${label}</option>`;
        }
      }
      document.getElementById('reservation_slot').innerHTML = slot_options;
    });
}

function formatTime(time) {
  const ampm = time < 12 ? 'AM' : 'PM';
  const t = time <= 12 ? time : time - 12;
  return `${t} ${ampm}`;
}

document.getElementById('button').addEventListener('click', () => {
  const formdata = {
    first_name: document.getElementById('first_name').value,
    reservation_date: dateInput.value,
    reservation_slot: document.getElementById('reservation_slot').value,
  };

  fetch("{% url 'bookings' %}", {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-CSRFToken': csrftoken
    },
    body: JSON.stringify(formdata)
  })
  .then(r => r.json())
  .then(data => {
    getBookings();
    document.getElementById('form').reset();
    dateInput.value = new Date().toISOString().split('T')[0];
  });
});
</script>
{% endblock %}
